name: Kaggle Kernel Auto Resume

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  ensure-running:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kaggle SDK
        run: python -m pip install --upgrade pip kaggle==2.0.1 requests

      - name: Ensure kernel is running
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "${KAGGLE_API_TOKEN}" ]; then
            echo "Missing required secret: KAGGLE_API_TOKEN"
            exit 1
          fi
          python kaggle/control_kernel.py ensure-running \
            --kernel rohansan1/nemotron-reasoning-lora-trainer \
            --machine-shape NvidiaRtxPro6000 \
            --json-out artifacts/remote/autoresume_status.json

